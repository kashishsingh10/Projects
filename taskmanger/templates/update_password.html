{% extends "base.html" %}
{% block content %}

<h2>Update Password</h2>

<form method="POST">
<input class="form-control mb-2" type="password" name="old" placeholder="Old Password">
<input class="form-control mb-2" type="password" name="new" placeholder="New Password">
<input class="form-control mb-2" type="password" name="confirm" placeholder="Confirm New Password">
<button class="btn btn-primary">Update</button>
</form>

{% endblock %}
